<!DOCTYPE html>
<html>

<head>
<title>C++ Web Demo</title>

<style>

body {
    font-family: Arial;
    background:#f0f0f0;
    text-align:center;
}

.container {
    width:700px;
    margin:auto;
}

.console {
    width:100%;
    height:300px;
    background:black;
    color:#00ff00;
    font-family:monospace;
    padding:10px;
}

input {
    padding:8px;
    font-size:16px;
}

button {
    padding:8px 15px;
    font-size:16px;
}

</style>
</head>

<body>

<div class="container">

<h1>C++ Web Demo</h1>

<p>Enter a number:</p>

<input id="userInput">

<button onclick="runProgram()">Run Program</button>

<textarea id="output" class="console"></textarea>

</div>

<script>

var Module = {
  print: function(text) {
      document.getElementById("output").value += text + "\n";
  },
  printErr: function(text) {
      document.getElementById("output").value += text + "\n";
  }
};

function runProgram() {

    document.getElementById("output").value = "";

    if (Module.callMain)
        Module.callMain([]);
}

</script>

<script src="program.js"></script>

</body>
</html>
