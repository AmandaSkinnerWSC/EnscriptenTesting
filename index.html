<div id="output"></div>
<input id="userInput" placeholder="Enter command">
<button onclick="submitCommand()">Send</button>

<script>
var Module = {
    print: function(text) {
        const out = document.getElementById("output");
        out.innerHTML += text + "<br>";
        out.scrollTop = out.scrollHeight;
    }
};

function submitCommand() {
    const cmd = document.getElementById("userInput").value;
    document.getElementById("userInput").value = "";
    if (Module.handleCommand) {
        let result = Module.handleCommand(cmd);
        Module.print(result);
    } else {
        setTimeout(submitCommand, 50);
    }
}
</script>
<script src="program.js"></script>
