<!DOCTYPE html>
<html>
<head>
<title>C++ Web Demo</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    text-align: center;
}

.container {
    width: 700px;
    margin: auto;
}

textarea {
    width: 100%;
    height: 300px;
    background: black;
    color: #00ff00;
    font-family: monospace;
    padding: 10px;
}

button {
    padding: 10px 20px;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="container">

<h1>My C++ Project</h1>
<p>This program is written in C++ and compiled to WebAssembly.</p>

<button onclick="runProgram()">Run Program</button>

<textarea id="output"></textarea>

</div>

<script>
var Module = {
  print: function(text) {
      document.getElementById("output").value += text + "\n";
  },
  printErr: function(text) {
      document.getElementById("output").value += text + "\n";
  }
};

function runProgram() {
    document.getElementById("output").value = "";
    Module.callMain();
}
</script>

<script src="program.js"></script>

</body>
</html>
